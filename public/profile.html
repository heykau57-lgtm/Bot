<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Waie - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#080310;--card:rgba(26,11,46,0.85);--pink:#db2777;--purple:#9333ea;--gray:#9ca3af;--font:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);background:radial-gradient(circle at 50% 0%,#1a0b2e 0%,#080310 80%);font-family:var(--font);color:#fff}
header{display:flex;align-items:center;gap:15px;padding:20px;background:rgba(8,3,16,0.95);border-bottom:1px solid rgba(255,255,255,0.05)}
.back-btn{background:rgba(219,39,119,0.1);border:1px solid rgba(219,39,119,0.3);color:var(--pink);padding:8px 15px;border-radius:12px;text-decoration:none;font-size:12px}
.brand{font-size:20px;font-weight:700;text-shadow:0 0 10px var(--pink)}
main{padding:20px;max-width:500px;margin:0 auto}
.card{background:var(--card);border:1px solid rgba(219,39,119,0.2);border-radius:20px;padding:25px;margin-bottom:20px}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));margin:0 auto 15px;display:flex;align-items:center;justify-content:center;font-size:32px}
.name{font-size:22px;text-align:center;margin-bottom:5px}
.role{text-align:center;color:var(--pink);font-size:12px;margin-bottom:20px}
.row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.row:last-child{border-bottom:none}
.label{color:var(--gray)}
.value{color:#fff}
.btn-logout{width:100%;padding:14px;background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;border-radius:12px;font-family:var(--font);cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<header>
<a href="/dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
<div class="brand">Waie Profile</div>
</header>
<main>
<div class="card">
<div class="avatar"><i class="fas fa-user"></i></div>
<div class="name" id="profileName">Loading...</div>
<div class="role" id="profileRole">USER</div>
<div class="row"><span class="label">Username</span><span class="value" id="username">-</span></div>
<div class="row"><span class="label">Role</span><span class="value" id="role">-</span></div>
<div class="row"><span class="label">Security Key</span><span class="value" id="key">******</span></div>
<div class="row"><span class="label">Expires</span><span class="value" id="expired">-</span></div>
<div class="row"><span class="label">Status</span><span class="value" id="status">-</span></div>
<button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
</main>
<script>
async function loadProfile(){
try{
const res=await fetch('/api/profile-data');
const d=await res.json();
document.getElementById('profileName').innerText=d.username;
document.getElementById('profileRole').innerText=d.role.toUpperCase();
document.getElementById('username').innerText=d.username;
document.getElementById('role').innerText=d.role;
document.getElementById('key').innerText=d.key||'******';
document.getElementById('expired').innerText=d.expired;
document.getElementById('status').innerText=d.status==='expired'?'Expired':'Active';
}catch(e){console.log(e)}
}
function logout(){fetch('/logout').then(()=>location.href='/login')}
loadProfile();
</script>
</body>
</html>
