<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Waie - Support</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#080310;--bg2:radial-gradient(circle at 50% 0%,#1a0b2e 0%,#080310 80%);--card:rgba(26,11,46,0.85);--pink:#db2777;--cyan:#06b6d4;--gray:#9ca3af;--font:'Share Tech Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);background-image:var(--bg2);font-family:var(--font);min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto}
header{background:rgba(8,3,16,0.95);padding:15px 20px;border-radius:20px;margin-bottom:20px;display:flex;align-items:center;gap:15px}
.back-btn{background:rgba(219,39,119,0.1);border:1px solid rgba(219,39,119,0.3);color:var(--pink);padding:8px 15px;border-radius:10px;text-decoration:none;font-size:12px}
.brand{font-size:18px;font-weight:700;color:#fff;text-shadow:0 0 10px var(--pink);flex:1;text-align:center}
.card{background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:25px;margin-bottom:20px;text-align:center}
.contact-btn{display:block;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:14px;border-radius:12px;text-decoration:none;margin-bottom:12px;font-size:13px}
</style>
</head>
<body>
<div class="container">
    <header>
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="brand">📞 SUPPORT</div>
    </header>
    <div class="card">
        <i class="fas fa-headset" style="font-size:48px;color:var(--pink);margin-bottom:15px;display:block"></i>
        <p style="color:var(--gray);font-size:12px;margin-bottom:20px">Need help? Contact developer:</p>
        <a href="https://t.me/ZyrlXit" class="contact-btn" target="_blank"><i class="fab fa-telegram"></i> Telegram: @ZyrlXit</a>
        <a href="https://whatsapp.com/channel/0029VbAr6sk6GcG7ja7yGD3a" class="contact-btn" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp Channel</a>
    </div>
</div>
</body>
</html>
